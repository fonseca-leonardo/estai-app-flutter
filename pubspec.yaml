name: estai
description: "A new Flutter project."

publish_to: 'none' 

version: 1.1.0+4

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^10.1.0
  permission_handler: ^11.0.1
  provider: ^6.1.1
  http: ^1.1.0
  url_launcher: ^6.3.1
  webview_flutter: ^4.9.0
  shared_preferences: ^2.2.2
  flutter_launcher_icons: ^0.14.4
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  firebase_app_check: ^0.4.1+3
  intl: ^0.20.2
  cloud_firestore: ^6.1.1
  google_mobile_ads: ^7.0.0
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^6.1.3
  wakelock_plus: ^1.2.8
  watch_connectivity: ^0.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.4.7


flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/icon.png"


flutter_native_splash:
  color: "#000000"
  image: "assets/images/splash_screen_logo.png"
  fullscreen: true
  branding: "assets/images/splash_branding.png"
  branding_mode: bottom
  branding_bottom_padding: 64

flutter:
  uses-material-design: true
  generate: true

l10n:
  synthetic-package: false
